<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TOUCH TEST</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;font-size:14px;}
#btn{width:120px;height:120px;border-radius:50%;background:#333;border:2px solid #0f0;color:#0f0;font-size:24px;display:flex;align-items:center;justify-content:center;margin:30px auto;cursor:pointer;touch-action:manipulation;}
#log{margin-top:20px;border:1px solid #0f0;padding:10px;min-height:200px;font-size:12px;line-height:1.8;}
</style>
</head>
<body>
<div style="text-align:center;letter-spacing:4px;font-size:16px;">SAFARI TOUCH TEST</div>
<div id="btn">TAP ME</div>
<div id="log">Waiting for events...<br></div>

<script>
var logEl = document.getElementById('log');
function log(msg) {
  logEl.innerHTML = new Date().toISOString().slice(11,19) + ' ' + msg + '<br>' + logEl.innerHTML;
}

log('Script running');
log('localStorage: ' + (function(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return 'OK';}catch(e){return 'BLOCKED: '+e.message;}})());
log('userAgent: ' + navigator.userAgent.slice(0,60));

var btn = document.getElementById('btn');

btn.addEventListener('touchstart', function(e){
  log('TOUCHSTART fired');
}, {passive:true});

btn.addEventListener('touchend', function(e){
  e.preventDefault();
  log('TOUCHEND fired — this should work!');
});

btn.addEventListener('click', function(e){
  log('CLICK fired');
});

window.addEventListener('error', function(e){
  log('JS ERROR: ' + e.message);
});

log('All listeners attached');
</script>

</body>
</html>
